pluginManagement {
    repositories {
        gradlePluginPortal()
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        mavenCentral()
    }
    def libs = versionCatalogs.create("libs") {
        from(files("gradle/libs.versions.toml"))
    }
    plugins {
        id("fabric-loom") version libs.findVersion("fabric-loom").get().requiredVersion
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

rootProject.name = 'iseelava-fabric-1.21.7'
