version: 2

updates:
  # -------------------------
  # Gradle dependencies
  # -------------------------
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "04:00"

    # Group updates by risk level
    groups:
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"
      gradle-major:
        update-types:
          - "major"

    # Ignore Minecraft / Fabric dependencies
    ignore:
      - dependency-name: "com.mojang:minecraft"
      - dependency-name: "net.fabricmc:fabric-loader"
      - dependency-name: "net.fabricmc.fabric-api:fabric-api"
      - dependency-name: "net.fabricmc.fabric-loom"

    open-pull-requests-limit: 2

    commit-message:
      prefix: "chore(deps)"

    labels:
      - "dependencies"
      - "gradle"

  # -------------------------
  # GitHub Actions
  # -------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "04:00"

    # Group all action updates together
    groups:
      github-actions:
        patterns:
          - "*"

    commit-message:
      prefix: "chore(ci)"

    labels:
      - "dependencies"
      - "github-actions"
