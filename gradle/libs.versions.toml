[versions]
# Mod Metadata
modVersion = "1.2.0"
mavenGroup = "mod.azure.iseelava"
modName = "iseelava"

# Toolchain and Environment
java = "25"
minecraft = "26.1-snapshot-10"
pack = "[82, 0]"            # Resource Pack Version

# Fabric Components
loom = "1.15.4"             # Fabric Loom Version
fabric = "0.143.6+26.1"     # Fabric API Version
fabricLoader = "0.18.4"     # Fabric Loader Version

[libraries]
# Dependencies in the build.gradle
minecraft = { group = "com.mojang", name = "minecraft", version.ref = "minecraft" }
fabric-loader = { group = "net.fabricmc", name = "fabric-loader", version.ref = "fabricLoader" }
fabric-api = { group = "net.fabricmc.fabric-api", name = "fabric-api", version.ref = "fabric" }

[plugins]
# Plugin in the build.gradle
loomID = { id = "net.fabricmc.fabric-loom", version.ref = "loom" }
