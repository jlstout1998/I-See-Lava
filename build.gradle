plugins {
	id 'java'
	alias(libs.plugins.loomID)
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
		vendor = JvmVendorSpec.ADOPTIUM
	}
}

ext {
	minecraftVersion = libs.versions.minecraft.get()
	fabricLoaderVersion = libs.versions.fabricLoader.get()
	modVersion = project.findProperty('modVersion') ?: 'unspecified'
	mavenGroup = project.findProperty('mavenGroup') ?: 'unspecified'
	modName = project.findProperty('modName') ?: project.name
}

group = ext.mavenGroup
version = ext.modVersion
base {
	archivesName = "${ext.modName}-${ext.minecraftVersion}"
}

repositories {
	mavenCentral()
	maven {
		name = 'Fabric'
		url = 'https://maven.fabricmc.net/'
	}
}

dependencies {
	minecraft libs.minecraft
	mappings libs.yarn
	modImplementation libs.fabric.loader
	modImplementation libs.fabric.api
}

tasks.named('processResources') {
	inputs.property "modVersion", ext.modVersion
	inputs.property "minecraftVersion", ext.minecraftVersion
	inputs.property "loaderVersion", ext.fabricLoaderVersion
	filesMatching("fabric.mod.json") {
		expand(
			"version": ext.modVersion,
			"minecraftVersion": ext.minecraftVersion,
			"loaderVersion": ext.fabricLoaderVersion
		)
	}
}

tasks.withType(JavaCompile).configureEach {
	options.release = java.toolchain.languageVersion.asInt().get()
}

tasks.named('jar') {
	def fullModName = "${ext.modName}-${ext.minecraftVersion}"
	from("LICENSE") {
		rename { "${it}_${fullModName}" }
	}
}
