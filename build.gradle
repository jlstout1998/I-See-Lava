plugins {
	id 'java'
	id 'fabric-loom' version '1.11.4'
}

import groovy.json.JsonSlurper
import groovy.json.JsonOutput

java {
	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
	
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
		vendor = JvmVendorSpec.ADOPTIUM
	}
}

base {
	archivesName = project.modName
}
version = project.modVersion
group = project.mavenGroup

repositories {
	mavenCentral()
	maven {
		name = 'Fabric'
		url = 'https://maven.fabricmc.net/'
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraftVersion}"
        mappings "net.fabricmc:yarn:${project.yarnVersion}"
	modImplementation "net.fabricmc:fabric-loader:${project.loaderVersion}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabricVersion}"
}

tasks.named('processResources') {
	def modVersionValue = project.modVersion
	inputs.property "version", modVersionValue
	filesMatching("fabric.mod.json") {
		expand "version": modVersionValue
	}
	finalizedBy(minifyJsonResources)
}

task minifyJsonResources {
	doLast {
		def jsonMinifyStart = System.currentTimeMillis()
		def jsonMinified = 0
		def jsonBytesSaved = 0
		fileTree(dir: 'build/resources/main', include: '**/*.json').each {
			File file ->
			jsonMinified++
			def oldLength = file.length()
			file.text = JsonOutput.toJson(new JsonSlurper().parse(file))
			jsonBytesSaved += oldLength - file.length()
		}
		println('Minified ' + jsonMinified + ' json files. Saved ' + jsonBytesSaved + ' bytes. Took ' + (System.currentTimeMillis() - jsonMinifyStart) + 'ms.')
	}
}

tasks.named('jar') {
	def modNameValue = project.modName
	from("LICENSE") {
		rename { "${it}_${modNameValue}" }
	}
}
