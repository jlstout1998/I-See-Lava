plugins {
	id 'java'
	id 'fabric-loom' version '1.11.4'
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
		vendor = JvmVendorSpec.ADOPTIUM
	}
}

def mcVersion = libs.versions.minecraft.get()

base {
	archivesName = "${project.modName}-${mcVersion}"
}
version = project.getProperty('modVersion')
group = project.getProperty('mavenGroup')

repositories {
	mavenCentral()
	maven {
		name = 'Fabric'
		url = 'https://maven.fabricmc.net/'
	}
}

dependencies {
	minecraft libs.minecraft
	mappings libs.yarn
	modImplementation libs.fabric.loader
	modImplementation libs.fabric.api
}

tasks.named('processResources') {
	def modVersionValue = project.modVersion
	def mcVersionValue = mcVersion
	def loaderVersionValue = project.loaderVersion
	inputs.property "version", modVersionValue
	inputs.property "minecraftVersion", mcVersionValue
	inputs.property "loaderVersion", loaderVersionValue
	filesMatching("fabric.mod.json") {
		expand(
			"version": modVersionValue,
			"minecraftVersion": mcVersionValue,
			"loaderVersion": loaderVersionValue
		)
	}
}

tasks.withType(JavaCompile).configureEach {
	options.release = 21
}

tasks.named('jar') {
	def fullModName = "${project.modName}-${mcVersion}"
	from("LICENSE") {
		rename { "${it}_${fullModName}" }
	}
}
