plugins {
	id 'java'
	alias(libs.plugins.loomID)
}

def replaceProperties = [
	"version": project.findProperty('modVersion') ?: 'unspecified',
	"minecraftVersion": libs.versions.minecraft.get(),
	"loaderVersion": libs.versions.fabricLoader.get(),
	"javaVersion": libs.versions.java.get().toInteger(),
	"packFormat": libs.versions.pack.get()
]
def modName = project.findProperty('modName') ?: project.name

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(replaceProperties.javaVersion)
		vendor = JvmVendorSpec.ADOPTIUM
	}
}

base {
	archivesName = "${modName}-${replaceProperties.minecraftVersion}"
}

dependencies {
	minecraft libs.minecraft
	implementation libs.fabric.loader
	implementation libs.fabric.api
}

tasks.named('processResources', ProcessResources).configure {   
    inputs.properties(replaceProperties)

    filesMatching(["fabric.mod.json", "resourcepacks/translucent_lava/pack.mcmeta"]) {
        expand replaceProperties
    }
}

tasks.withType(JavaCompile).configureEach {
	options.release = java.toolchain.languageVersion.get().asInt()
}

tasks.named('jar') {
	def fullModName = "${modName}-${replaceProperties.minecraftVersion}"
	from("LICENSE") {
		rename { "${it}_${fullModName}" }
	}
}






